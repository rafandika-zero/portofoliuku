<head>

    <link class="link" rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">Rafandika</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                    <li class="nav-item"><a class="nav-link active" href="contact.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="contact" class="py-5">
        <div class="container">
            <div class="row justify-content-center text-center mb-4">
                <div class="col-md-6">
                    <h2 class="fw-bold">Mulai Kerja Sama</h2>
                    <hr class="w-25 mx-auto text-primary" style="height: 3px;">
                </div>
            </div>  
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Nama Anda / Perusahaan</label>
                            <input type="text" class="form-control" id="name" placeholder="Masukkan nama">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Alamat Email</label>
                            <input type="email" class="form-control" id="email" placeholder="nama@perusahaan.com">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label fw-semibold">Detail Project</label>
                            <textarea class="form-control" id="message" rows="4" placeholder="Jelaskan kebutuhan pengeditan video Anda..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Kirim Penawaran</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
